<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Хроники Вовы</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        font-family: "Cinzel", serif;
        background: #0b0b0f;
        overflow-x: hidden;
      }

      .magic-spark {
        position: fixed;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        background: radial-gradient(circle, #ffe66d, #ff9f1c);
        box-shadow: 0 0 10px #ffd166;
        animation: sparkFade 0.7s linear forwards;
      }
      html,
      body {
        scrollbar-width: none; /* Firefox */
        -ms-overflow-style: none; /* IE */
      }

      html::-webkit-scrollbar,
      body::-webkit-scrollbar {
        display: none; /* Chrome, Edge, Safari */
      }
      @keyframes sparkFade {
        0% {
          opacity: 1;
          transform: scale(1);
        }
        100% {
          opacity: 0;
          transform: scale(0.2) translateY(-10px);
        }
      }

      .cover {
        position: relative;
        height: 100vh;
        background: url("images/darkfantazy.png") center/cover no-repeat;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: #f5e6c8;
        overflow: hidden;
      }

      .cover::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.7) 0%,
          rgba(0, 0, 0, 0) 70%,
          rgba(0, 0, 0, 0.9) 100%
        );
      }

      .cover-content {
        position: relative;
        z-index: 3;
        padding: 20px;
      }

      .cover h1 {
        font-size: 64px;
        margin-bottom: 20px;
        text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.7);
      }

      .cover p {
        font-size: 24px;
        margin-bottom: 20px;
      }

      .cover button {
        padding: 12px 30px;
        font-size: 18px;
        border: none;
        border-radius: 8px;
        background: rgba(120, 0, 255, 0.85);
        color: white;
        cursor: pointer;
        transition: 0.3s;
        font-family: "Cinzel", serif;
      }

      .cover button:hover {
        transform: scale(1.05);
      }

      .gallery-section {
        padding: 60px 20px 1000px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 50px;
        position: relative;
        z-index: 3;
      }

      .story-image {
        width: 100%;
        max-width: 900px;
        border-radius: 14px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
        display: block;
        position: relative;
        z-index: 4;
        opacity: 0;
        transform: translateY(40px);
        transition:
          opacity 1s ease,
          transform 1s ease,
          box-shadow 0.3s ease;
      }

      .story-image.show {
        opacity: 1;
        transform: translateY(0);
      }

      .story-image:hover {
        transform: translateY(0) scale(1.02);
        box-shadow: 0 0 50px rgba(255, 200, 100, 0.4);
      }

      #music-btn {
        position: fixed;
        top: 20px;
        right: 30px;
        z-index: 9999;
        padding: 10px 15px;
        border: none;
        border-radius: 8px;
        background: rgba(120, 0, 255, 0.9);
        color: #fff;
        cursor: pointer;
        font-family: "Cinzel", serif;
      }

      #particles-js {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }

      .fog {
        position: fixed;
        top: 0;
        left: 0;
        width: 120%;
        height: 100%;
        background: url("images/fog.png") no-repeat center;
        background-size: cover;
        filter: blur(18px);
        opacity: 0.1;
        z-index: 1;
        pointer-events: none;
        animation: fogMove 60s linear infinite alternate;
      }
      #fullscreen-btn {
        position: fixed;
        top: 20px;
        left: 80px;
        z-index: 9999;
        padding: 8px 12px;
        border: none;
        border-radius: 6px;
        background: rgba(120, 0, 255, 0.9);
        color: white;
        cursor: pointer;
      }
      .fog2 {
        opacity: 0.08;
        animation: fogMove 100s linear infinite alternate-reverse;
      }

      @keyframes fogMove {
        from {
          transform: translateX(-120px) translateY(0);
        }
        to {
          transform: translateX(120px) translateY(40px);
        }
      }
      .intro-text {
        font-size: 20px;
        margin-bottom: 25px;
        color: #e7d7a5;
        opacity: 0;
        transform: translateY(20px);
        animation: introFade 2s ease forwards;
        animation-delay: 0.5s;
      }

      @keyframes introFade {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .letter-block {
        text-align: center;
        margin-top: 20px;
        position: relative;
        z-index: 4;
      }

      #open-letter-btn {
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #7b2cff, #c084fc);
        color: white;
        cursor: pointer;
        transition: 0.3s;
        font-family: "Cinzel", serif;
      }

      #open-letter-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 10px 25px rgba(123, 44, 255, 0.4);
      }

      #screen-darkness {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0);
        pointer-events: none;
        z-index: 10;
        transition: background 0.8s ease;
      }

      #letter-container {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        opacity: 0;
        transition: opacity 0.5s ease;
        justify-content: center;
        align-items: center;
        pointer-events: none;
      }

      #letter-scroll {
        position: relative;
        width: min(92vw, 1000px);
        max-height: 90vh;
        overflow-y: auto;
        overflow-x: hidden;
        border-radius: 16px;
        z-index: 21;
        pointer-events: auto;
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.65);
        margin: 0 auto;
        transform: scaleY(0.05);
        transform-origin: top center;
        opacity: 0;
        transition:
          transform 0.9s ease,
          opacity 0.9s ease,
          box-shadow 0.6s ease;
        animation: glow 2s infinite alternate;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      #letter-scroll::-webkit-scrollbar {
        display: none;
      }

      #letter-scroll.open {
        transform: scaleY(1);
        opacity: 1;
        box-shadow:
          0 0 35px rgba(255, 190, 90, 0.35),
          0 20px 80px rgba(0, 0, 0, 0.65);
      }

      @keyframes glow {
        from {
          box-shadow: 0 0 20px rgba(255, 200, 100, 0.2);
        }
        to {
          box-shadow: 0 0 60px rgba(255, 200, 100, 0.6);
        }
      }

      #letter-image {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 16px;
        transform: scale(0.98);
        transition: transform 0.9s ease;
      }

      #letter-scroll.open #letter-image {
        transform: scale(1);
      }

      #close-letter-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 22;
        width: 46px;
        height: 46px;
        border: none;
        border-radius: 50%;
        background: rgba(120, 0, 255, 0.95);
        color: white;
        font-size: 24px;
        cursor: pointer;
        display: none;
        pointer-events: auto;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        font-family: "Cinzel", serif;
      }

      #close-letter-btn:hover {
        transform: scale(1.06);
      }

      #the-end {
        position: fixed;
        inset: 0;
        background: black;
        color: #ffe6a7;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 64px;
        opacity: 0;
        pointer-events: none;
        z-index: 30;
        transition: 1.5s;
        letter-spacing: 5px;
        text-shadow: 0 0 20px rgba(255, 230, 167, 0.5);
      }

      @media (max-width: 768px) {
        .cover h1 {
          font-size: 42px;
        }

        .cover p {
          font-size: 18px;
        }

        .cover button,
        #open-letter-btn {
          font-size: 16px;
          padding: 12px 22px;
        }

        #music-btn {
          top: 14px;
          right: 14px;
          padding: 8px 12px;
          font-size: 14px;
        }

        #close-letter-btn {
          top: 14px;
          left: 14px;
        }

        #the-end {
          font-size: 42px;
        }
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 2;
        background:
          radial-gradient(
            circle at left center,
            rgba(255, 180, 80, 0.14),
            transparent 32%
          ),
          radial-gradient(
            circle at right center,
            rgba(123, 44, 255, 0.14),
            transparent 32%
          );
      }

      .side-vignette {
        position: fixed;
        top: 0;
        width: 180px;
        height: 100%;
        pointer-events: none;
        z-index: 2;
        opacity: 0.35;
        filter: blur(18px);
      }

      .side-vignette.left {
        left: 0;
        background: linear-gradient(to right, rgba(0, 0, 0, 0.65), transparent);
      }

      .side-vignette.right {
        right: 0;
        background: linear-gradient(to left, rgba(0, 0, 0, 0.65), transparent);
      }
      #secret-photo {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        pointer-events: none;
        z-index: 50;
        transition: 0.6s;
      }

      #secret-photo img {
        max-width: 80%;
        border-radius: 20px;
        box-shadow: 0 0 60px rgba(255, 200, 100, 0.5);
        transform: scale(0.8);
        transition: 0.6s;
      }

      #secret-photo.show {
        opacity: 1;
        pointer-events: auto;
      }

      #secret-photo.show img {
        transform: scale(1);
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  </head>
  <body>
    <div id="secret-photo">
      <img src="images/secret.png" alt="секрет" />
    </div>
    <div id="the-end">The End ✨</div>
    <div id="particles-js"></div>
    <div id="screen-darkness"></div>
    <div class="side-vignette left"></div>
    <div class="side-vignette right"></div>
    <div class="fog"></div>
    <div class="fog fog2"></div>

    <audio id="bg-music" src="track.mp3" loop></audio>
    <audio id="open-sound" src="open.mp3" preload="auto"></audio>

    <button id="music-btn">Play Music</button>
    <button id="fullscreen-btn">⛶</button>

    <section class="cover">
      <div class="cover-content">
        <h1>Хроники Вовы</h1>
        <p>Нажми и открой магическую книгу</p>
        <button onclick="scrollToGallery()">Открыть хроники</button>
        <p class="intro-text">
          Каждая легенда начинается с первой страницы… Возможно, эта — про тебя.
        </p>
      </div>
    </section>

    <section class="gallery-section" id="gallery">
      <img class="story-image" src="images/page1.png" alt="Страница 1" />
      <img class="story-image" src="images/page2.png" alt="Страница 2" />
      <img class="story-image" src="images/page3.png" alt="Страница 3" />
      <img class="story-image" src="images/page4.png" alt="Страница 4" />
      <img class="story-image" src="images/page5.png" alt="Страница 5" />
      <img class="story-image" src="images/page6.png" alt="Страница 6" />

      <div class="letter-block">
        <button id="open-letter-btn">Открыть открытку 💌</button>
      </div>
    </section>

    <div id="letter-container">
      <button id="close-letter-btn">✕</button>
      <div id="letter-scroll">
        <img id="letter-image" src="images/letter.png" alt="Открытка" />
      </div>
    </div>

    <script>
      function scrollToGallery() {
        document.getElementById("gallery").scrollIntoView({
          behavior: "smooth",
        });
      }

      const music = document.getElementById("bg-music");
      const musicBtn = document.getElementById("music-btn");
      const btn = document.getElementById("open-letter-btn");
      const letter = document.getElementById("letter-container");
      const darkness = document.getElementById("screen-darkness");
      const closeLetterBtn = document.getElementById("close-letter-btn");
      const letterScroll = document.getElementById("letter-scroll");
      const openSound = document.getElementById("open-sound");
      const theEnd = document.getElementById("the-end");
      const cover = document.querySelector(".cover");
      music.volume = 0.2;
      openSound.volume = 0.8;
      const images = document.querySelectorAll(".story-image");
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) e.target.classList.add("show");
        });
      });

      images.forEach((img) => observer.observe(img));

      function openLetter() {
        darkness.style.background = "rgba(0, 0, 0, 0.72)";
        letter.style.display = "flex";
        closeLetterBtn.style.display = "block";

        if (openSound) {
          openSound.currentTime = 0;
          openSound.play().catch(() => {});
        }

        requestAnimationFrame(() => {
          letter.style.opacity = "1";
          letter.style.pointerEvents = "auto";

          requestAnimationFrame(() => {
            letterScroll.classList.add("open");
          });
        });

        document.body.style.overflow = "hidden";
        letterScroll.scrollTop = 0;
      }

      function closeLetter() {
        darkness.style.background = "rgba(0, 0, 0, 0)";
        letter.style.opacity = "0";
        letter.style.pointerEvents = "none";
        closeLetterBtn.style.display = "none";
        letterScroll.classList.remove("open");

        setTimeout(() => {
          letter.style.display = "none";
          btn.style.display = "inline-block";
        }, 800);

        document.body.style.overflow = "";
      }

      btn.addEventListener("click", () => {
        btn.style.display = "none";
        openLetter();
      });

      closeLetterBtn.addEventListener("click", closeLetter);

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && letter.style.display === "flex") {
          closeLetter();
        }
      });

      musicBtn.addEventListener("click", () => {
        if (music.paused) {
          music.play();
          musicBtn.textContent = "Pause Music";
        } else {
          music.pause();
          musicBtn.textContent = "Play Music";
        }
      });

      particlesJS("particles-js", {
        particles: {
          number: {
            value: 50,
            density: {
              enable: true,
              value_area: 800,
            },
          },
          color: {
            value: "#ffe56d",
          },
          shape: {
            type: "circle",
          },
          opacity: {
            value: 0.9,
            random: true,
            anim: {
              enable: true,
              speed: 1,
              opacity_min: 0.2,
              sync: false,
            },
          },
          size: {
            value: 4,
            random: true,
            anim: {
              enable: true,
              speed: 1,
              size_min: 2,
              sync: false,
            },
          },
          line_linked: {
            enable: false,
          },
          move: {
            enable: true,
            speed: 0.2,
            direction: "none",
            random: true,
            straight: false,
            out_mode: "out",
            bounce: false,
          },
        },
        interactivity: {
          detect_on: "canvas",
          events: {
            onhover: {
              enable: false,
            },
            onclick: {
              enable: false,
            },
          },
        },
        retina_detect: true,
      });

      let last = 0;

      document.addEventListener("mousemove", (e) => {
        if (Date.now() - last < 30) return;
        last = Date.now();

        const spark = document.createElement("div");
        spark.className = "magic-spark";
        spark.style.left = e.clientX + "px";
        spark.style.top = e.clientY + "px";

        document.body.appendChild(spark);

        setTimeout(() => spark.remove(), 700);
      });

      window.addEventListener("scroll", () => {
        if (
          window.innerHeight + window.scrollY >=
          document.body.offsetHeight - 100
        ) {
          theEnd.style.opacity = "1";
        }
      });

      document.addEventListener("mousemove", (e) => {
        const x = (e.clientX / window.innerWidth - 0.5) * 20;
        const y = (e.clientY / window.innerHeight - 0.5) * 20;
        cover.style.transform = `translate(${x}px, ${y}px)`;
      });
      function scrollToGallery() {
        document.getElementById("gallery").scrollIntoView({
          behavior: "smooth",
        });

        if (music.paused) {
          music.play().catch(() => {});
          musicBtn.textContent = "Pause Music";
        }
      }
      const fsBtn = document.getElementById("fullscreen-btn");

      fsBtn.addEventListener("click", () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
        } else {
          document.exitFullscreen();
        }
      });
      const fog1 = document.querySelector(".fog");
      const fog2 = document.querySelector(".fog2");
      const leftVignette = document.querySelector(".side-vignette.left");
      const rightVignette = document.querySelector(".side-vignette.right");

      document.addEventListener("mousemove", (e) => {
        const x = (e.clientX / window.innerWidth - 0.5) * 30;
        const y = (e.clientY / window.innerHeight - 0.5) * 20;

        if (fog1) fog1.style.transform = `translate(${x}px, ${y}px)`;
        if (fog2) fog2.style.transform = `translate(${-x}px, ${-y}px)`;

        if (leftVignette)
          leftVignette.style.transform = `translateX(${x * 0.2}px)`;
        if (rightVignette)
          rightVignette.style.transform = `translateX(${-x * 0.2}px)`;
      });
      const title = document.querySelector(".cover h1");
      const secret = document.getElementById("secret-photo");

      let clicks = 0;

      title.addEventListener("click", () => {
        clicks++;

        if (clicks === 3) {
          secret.classList.add("show");

          setTimeout(() => {
            clicks = 0;
          }, 1000);
        }
      });

      // закрытие по клику
      secret.addEventListener("click", () => {
        secret.classList.remove("show");
      });
    </script>
  </body>
</html>
